<!DOCTYPE html>
<html class="light" lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{title}</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<!-- Tailwind -->
{tailwind_config}
<!-- Custom styles -->
<style>
.material-symbols-outlined {{ font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }}
body {{ background-color: #f7f9fb; color: #191c1e; }}
.diagram-container {{ border: 1px solid #c3c6d7; background-color: #eceef0; }}
pre code {{ font-family: 'JetBrains Mono', monospace; }}
.code-block {{ background-color: #2d3133; color: #eff1f3; }}
.custom-scrollbar::-webkit-scrollbar {{ width: 4px; }}
.custom-scrollbar::-webkit-scrollbar-track {{ background: transparent; }}
.custom-scrollbar::-webkit-scrollbar-thumb {{ background: #c3c6d7; border-radius: 10px; }}
/* Markdown content styles */
.content h2 {{ font-family: Inter, sans-serif; font-size: 24px; line-height: 1.3; letter-spacing: -0.01em; font-weight: 600; margin-top: 2rem; margin-bottom: 1rem; }}
.content h3 {{ font-family: Inter, sans-serif; font-size: 20px; line-height: 1.4; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }}
.content p {{ margin-bottom: 0.75rem; }}
.content table {{ width: 100%; border-collapse: collapse; }}
.content th {{ padding: 1rem 1.5rem; font-family: Inter, sans-serif; font-size: 14px; font-weight: 600; text-align: left; background: #e6e8ea; border-bottom: 1px solid #c3c6d7; }}
.content td {{ padding: 1rem 1.5rem; font-size: 14px; border-bottom: 1px solid #c3c6d7; }}
.content tr:hover td {{ background: #eceef0; }}
.content pre {{ background: #2d3133; color: #eff1f3; padding: 1rem; border-radius: 0.25rem; overflow-x: auto; }}
.content code {{ font-family: 'JetBrains Mono', monospace; font-size: 14px; }}
.content img {{ max-width: 100%; border-radius: 0.25rem; }}
.content blockquote {{ border-left: 4px solid #0f766e; padding-left: 1rem; color: #434655; margin: 1rem 0; }}
{print_styles}
</style>
</head>
<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container" data-artifact-type="{doc_type}">
<div class="flex min-h-screen">
<!-- Sidebar -->
<aside class="fixed left-0 top-0 h-screen w-sidebar_width bg-surface-container-low border-r border-outline-variant flex flex-col py-stack_md overflow-y-auto custom-scrollbar">
<div class="px-6 mb-8">
<span class="font-h3 text-h3 font-bold text-on-surface block mb-2">BA-kit</span>
<div class="font-h4 text-h4 font-semibold text-on-surface">{badge}</div>
<div class="text-[12px] text-on-surface-variant uppercase tracking-wider mt-1">{project_name}</div>
</div>
<nav class="flex-1">
<ul class="space-y-1">
{toc_items}
</ul>
</nav>
<div class="px-6 mt-auto pt-6 border-t border-outline-variant/30">
<p class="text-[11px] text-on-surface-variant">{generated_date}</p>
</div>
</aside>
<!-- Main Content -->
<main class="flex-1 ml-sidebar_width">
<div class="max-w-content_max_width mx-auto px-6 lg:px-12 py-12">
<!-- Hero -->
<article class="mb-stack_lg">
<h1 class="font-h1 text-h1 text-on-surface mb-4">{title}</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl leading-relaxed">{summary}</p>
</article>
<hr class="border-outline-variant mb-stack_lg">
<!-- Content -->
<div class="content">
{body}
</div>
</div>
<!-- Footer -->
<footer class="w-full mt-stack_lg border-t border-outline-variant bg-surface py-8 px-12">
<p class="text-sm text-on-surface-variant text-center">{footer_text}</p>
</footer>
</main>
</div>
<!-- Scroll spy -->
<script>
(function() {{
    const sectionIds = {section_ids_json};
    const links = document.querySelectorAll('aside nav a[href^="#"]');
    links.forEach(function(link) {{
        link.addEventListener('click', function(e) {{
            e.preventDefault();
            var id = this.getAttribute('href').substring(1);
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({{ behavior: 'smooth' }});
        }});
    }});
    window.addEventListener('scroll', function() {{
        var current = '';
        sectionIds.forEach(function(id) {{
            var el = document.getElementById(id);
            if (el && el.getBoundingClientRect().top <= 150) current = id;
        }});
        links.forEach(function(link) {{
            var href = link.getAttribute('href');
            var isActive = href && href.substring(1) === current;
            link.classList.toggle('text-primary', isActive);
            link.classList.toggle('bg-primary/5', isActive);
            link.classList.toggle('border-primary', isActive);
            link.classList.toggle('font-bold', isActive);
            link.classList.toggle('text-on-surface-variant', !isActive);
            link.classList.toggle('border-transparent', !isActive);
        }});
    }});
}})();
</script>
<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>mermaid.initialize({{ startOnLoad: true }});</script>
</body>
</html>
